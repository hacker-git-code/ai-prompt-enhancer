<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Rocket body -->
  <path d="M64 20 L48 40 L80 40 Z" fill="#ffffff" opacity="0.9"/>
  <rect x="56" y="40" width="16" height="40" fill="#ffffff" opacity="0.9"/>
  <rect x="52" y="80" width="24" height="8" fill="#ffffff" opacity="0.9"/>
  
  <!-- Rocket fins -->
  <path d="M48 40 L40 60 L48 60 Z" fill="#e74c3c"/>
  <path d="M80 40 L88 60 L80 60 Z" fill="#e74c3c"/>
  
  <!-- Rocket window -->
  <circle cx="64" cy="50" r="4" fill="#3498db"/>
  
  <!-- Sparkles -->
  <g fill="#f1c40f">
    <circle cx="30" cy="30" r="2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="25" r="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="90" r="1" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="95" cy="95" r="1.5" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Enhancement rays -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.6">
    <line x1="64" y1="15" x2="64" y2="5">
      <animate attributeName="stroke-opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="75" y1="25" x2="85" y2="15">
      <animate attributeName="stroke-opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="53" y1="25" x2="43" y2="15">
      <animate attributeName="stroke-opacity" values="0.6;0.2;0.6" dur="1.2s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>