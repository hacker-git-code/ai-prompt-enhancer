<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)" stroke="#4c63d2" stroke-width="4"/>
  
  <!-- Main icon elements -->
  <g fill="white" stroke="white" stroke-width="2">
    <!-- Chat bubble base -->
    <path d="M30 45 L70 45 L70 75 L60 85 L50 75 L30 75 Z" fill="white" opacity="0.9"/>
    
    <!-- Enhancement sparkles -->
    <circle cx="85" cy="35" r="3" fill="white"/>
    <circle cx="95" cy="45" r="2" fill="white"/>
    <circle cx="80" cy="50" r="2.5" fill="white"/>
    
    <!-- Arrow indicating enhancement -->
    <path d="M75 40 L90 25 M90 25 L95 30 M90 25 L85 30" stroke="white" stroke-width="2" fill="none"/>
    
    <!-- Text lines in chat bubble -->
    <rect x="35" y="50" width="25" height="2" rx="1" fill="white" opacity="0.7"/>
    <rect x="35" y="55" width="20" height="2" rx="1" fill="white" opacity="0.7"/>
    <rect x="35" y="60" width="30" height="2" rx="1" fill="white" opacity="0.7"/>
  </g>
  
  <!-- Additional enhancement elements -->
  <g fill="white" opacity="0.8">
    <circle cx="100" cy="20" r="2"/>
    <circle cx="105" cy="15" r="1.5"/>
    <circle cx="110" cy="25" r="1"/>
  </g>
</svg>